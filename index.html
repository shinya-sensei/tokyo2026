<style>
  /* 前回のスタイルを継承しつつ、担当者用の色味を追加 */
  .staff-text { font-size: 0.75rem; color: #0056b3; font-weight: bold; margin-bottom: 2px; }
  .card { border-left: 5px solid #007bff; } /* 青色基調に変更 */
  .card.checked { border-left: 5px solid #6c757d; }
</style>

<script>
  // フィルタリング（検索）機能の修正
  function filterCards() {
    if (isConfirming) return;
    const input = document.getElementById('searchInput').value.trim();
    const container = document.getElementById('cardContainer');
    
    if (input === "") {
      container.innerHTML = '<p class="text-center text-muted mt-5">検索ワードを入力してください</p>';
      return;
    }

    const searchTarget = toKatakana(input).toLowerCase();
    
    const filtered = allData.filter(item => {
      const nameMatch = toKatakana(item.name).toLowerCase().includes(searchTarget);
      const kanaMatch = toKatakana(item.kana).toLowerCase().includes(searchTarget);
      return nameMatch || kanaMatch; // 名前(B+C) または カナ(K+L) に含まれるか
    });

    if (filtered.length === 0) {
      container.innerHTML = '<p class="text-center text-muted mt-5">該当者は見つかりませんでした</p>';
      return;
    }
    renderCards(filtered);
  }

  // カード描画の修正
  function renderCards(data) {
    const container = document.getElementById('cardContainer');
    container.innerHTML = data.map(item => {
      const countVal = String(item.count || "").trim();
      const isZeroOrEmpty = (countVal === "" || countVal === "0");
      const countHtml = isZeroOrEmpty 
        ? `ナチュラ確定：<span class="count-none">❌</span>`
        : `ナチュラ確定：<span class="count-num">${countVal}</span>`;

      return `
      <div class="col-12">
        <div class="card shadow-sm ${item.checked ? 'checked' : ''}">
          <div class="card-body p-3">
            <div class="d-flex justify-content-between align-items-center">
              <div style="flex: 1; overflow: hidden;">
                <div class="staff-text">担当：${item.staff || '未指定'}</div>
                <div class="name-text">${item.name} 様</div>
                <div class="info-row">
                  <span class="seat-box">${item.seat || '---'} 席</span>
                  <span class="count-badge">${countHtml}</span>
                </div>
              </div>
              <div class="ms-2 flex-shrink-0" id="btn-area-${item.rowNum}">
                ${item.checked 
                  ? '<button class="btn btn-secondary btn-checkin" disabled>済</button>' 
                  : `<button class="btn btn-primary btn-checkin" onclick="confirmCheckIn(${item.rowNum}, '${item.name.replace(/'/g, "\\'")}')">受付</button>`}
              </div>
            </div>
          </div>
        </div>
      </div>
    `}).join('');
  }
</script>
