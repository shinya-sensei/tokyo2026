<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年6月20日 貸切企画まとめ</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #d4af37; /* 上品なゴールド */
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 10px 0;
            letter-spacing: 0.05em;
        }

        .date {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-bottom: 50px;
        }

        @media (min-width: 600px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.1);
        }

        .video-link {
            text-decoration: none;
            color: inherit;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            overflow: hidden;
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-info {
            padding: 15px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .video-title {
            font-size: 1.1rem;
            margin: 0 0 5px 0;
            font-weight: bold;
        }

        .video-sub {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .resources-box {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 30px;
            border: 1px solid #333;
            text-align: center;
        }

        .btn-shared {
            display: inline-block;
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-shared:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>貸切企画 総合リソースまとめ</h1>
            <div class="date">2026.06.20</div>
        </header>

        <main>
            <section>
                <div class="section-title">セミナー動画アーカイブ</div>
                <div class="video-grid">
                    
                    <div class="video-card">
                        <a href="https://youtu.be/NOko1UziCog" target="_blank" class="video-link">
                            <div class="thumbnail-container">
                                <img src="https://img.youtube.com/vi/NOko1UziCog/maxresdefault.jpg" alt="Part1 サムネイル">
                            </div>
                            <div class="video-info">
                                <div class="video-title">第1部</div>
                                <div class="video-sub">YouTubeで視聴する</div>
                            </div>
                        </a>
                    </div>

                    <div class="video-card">
                        <a href="https://youtu.be/0TaBqNIpvzw" target="_blank" class="video-link">
                            <div class="thumbnail-container">
                                <img src="https://img.youtube.com/vi/0TaBqNIpvzw/maxresdefault.jpg" alt="Part2 サムネイル">
                            </div>
                            <div class="video-info">
                                <div class="video-title">第2部</div>
                                <div class="video-sub">YouTubeで視聴する</div>
                            </div>
                        </a>
                    </div>

                    <div class="video-card">
                        <a href="https://youtu.be/ROEH23mL5dU" target="_blank" class="video-link">
                            <div class="thumbnail-container">
                                <img src="https://img.youtube.com/vi/ROEH23mL5dU/maxresdefault.jpg" alt="Part3 サムネイル">
                            </div>
                            <div class="video-info">
                                <div class="video-title">第3部</div>
                                <div class="video-sub">YouTubeで視聴する</div>
                            </div>
                        </a>
                    </div>

                </div>
            </section>

            <section>
                <div class="section-title">配布・共有資料</div>
                <div class="resources-box">
                    <p style="margin: 0 0 10px 0;">セミナーで使用したスライド、および各種共有ファイルは下記に集約しています。</p>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0 0 20px 0;">（外部ストレージ：Google ドライブへ遷移します）</p>
                    <a href="https://drive.google.com/drive/folders/1x5rmBS0CbL33FN4tZIffOQoptKU9h_Hm?usp=sharing" target="_blank" class="btn-shared">
                        共有フォルダを開く
                    </a>
                </div>
            </section>
        </main>

        <footer>
            &copy; 2026 Inner Beauty Seminar. All Rights Reserved.
        </footer>
    </div>

</body>
</html>
